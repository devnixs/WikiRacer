    <app-page-frame
      [eyebrow]="localization.t('home.eyebrow')"
      [title]="localization.t('home.title')"
      [description]="localization.t('home.description')"
    >
      <section class="hero-grid">
        <div class="hero-grid__intro">
          <form class="create-lobby" (ngSubmit)="createLobby()">
            <label class="create-lobby__label" for="display-name">{{ localization.t('home.create') }}</label>
            <div class="create-lobby__controls">
              <input
                id="display-name"
                name="displayName"
                [(ngModel)]="displayName"
                [disabled]="isCreating()"
                maxlength="32"
                [placeholder]="localization.t('home.create.placeholder')"
                required
              />
              <button type="submit" [disabled]="isCreating() || !displayName.trim()">
                {{ isCreating() ? localization.t('home.create.creating') : localization.t('home.create.button') }}
              </button>
            </div>
            @if (createError(); as error) {
              <p class="create-lobby__error">{{ error }}</p>
            }
          </form>

          <div class="metric-grid">
            <app-metric-tile label="Game modes" value="2" hint="Play solo to beat your own time, or race friends in multiplayer." />
            <app-metric-tile label="Languages" value="2" hint="Race through English or French Wikipedia articles." />
            <app-metric-tile label="Multiplayer" value="Live" hint="Races happen in real time — everyone navigates at the same moment." />
          </div>
        </div>

        <div class="feature-grid">
          <app-feature-card
            label="Navigate"
            title="Click links to hop between articles"
            body="Every click on a Wikipedia link counts as a hop. Find the shortest path from the start article to the target."
          />
          <app-feature-card
            label="Compete"
            title="Race your friends in real time"
            body="Everyone starts at the same article and races to reach the target. First to arrive — or fewest hops — wins."
          />
          <app-feature-card
            label="Explore"
            title="Discover unexpected connections"
            body="Wikipedia's web of articles hides surprising shortcuts. The best racers find paths others never thought of."
          />
        </div>
      </section>
    </app-page-frame>
