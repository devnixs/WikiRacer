    <app-page-frame
      [eyebrow]="localization.t('home.eyebrow')"
      [title]="localization.t('home.title')"
      [description]="localization.t('home.description')"
    >
      <section class="hero-grid">
        <div class="hero-grid__intro">
          <app-chip text="Design System Seeded" [contrast]="true" />

          <form class="create-lobby" (ngSubmit)="createLobby()">
            <label class="create-lobby__label" for="display-name">{{ localization.t('home.create') }}</label>
            <div class="create-lobby__controls">
              <input
                id="display-name"
                name="displayName"
                [(ngModel)]="displayName"
                [disabled]="isCreating()"
                maxlength="32"
                [placeholder]="localization.t('home.create.placeholder')"
                required
              />
              <button type="submit" [disabled]="isCreating() || !displayName.trim()">
                {{ isCreating() ? localization.t('home.create.creating') : localization.t('home.create.button') }}
              </button>
            </div>
            @if (createError(); as error) {
              <p class="create-lobby__error">{{ error }}</p>
            }
          </form>

          <div class="metric-grid">
            <app-metric-tile label="Feature Areas" value="4" hint="Home, lobby, match, and results all have dedicated routes." />
            <app-metric-tile label="UI Primitives" value="4" hint="Shared page frames, cards, metrics, and chips are reusable." />
            <app-metric-tile label="Protocol Ready" value="v1" hint="Frontend structure aligns with the shared contracts defined in story 003." />
          </div>
        </div>

        <div class="feature-grid">
          <app-feature-card
            label="Routing"
            title="Dedicated feature slices"
            body="Each core experience has its own page component and route, keeping future state and transport logic scoped cleanly."
          />
          <app-feature-card
            label="Theme"
            title="Vivid but controlled visual language"
            body="Warm highlights, cool panels, and display/body typography are codified as tokens instead of one-off component styles."
          />
          <app-feature-card
            label="Layout"
            title="Composable shell pieces"
            body="Feature pages share the same page-frame and card primitives, which keeps later stories from rebuilding basic structure."
          />
        </div>
      </section>
    </app-page-frame>
